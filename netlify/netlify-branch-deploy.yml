name: Deploy branch to Netlify

trigger: none

pool:
  vmImage: 'ubuntu-22.04'

parameters:
  - name: appname
    displayName: App to deploy
    type: string
    default: pensions-dashboard
    values:
      - adjustable-income-calculator
      - baby-cost-calculator
      - budget-planner
      - cash-in-chunks
      - compare-accounts
      - credit-rejection
      - debt-advice-locator
      - leave-pot-untouched
      - money-adviser-network
      - moneyhelper-contact-forms
      - moneyhelper-tools
      - mortgage-calculator
      - pensions-dashboard
      - pensionwise-appointment
      - pensionwise-triage
      - standard-financial-statement
      - guaranteed-income-estimator
      - take-whole-pot
      - tools-index
      - mortgage-affordability
      - redundancy-pay-calculator
      - retirement-budget-planner
      - stamp-duty-calculator
      - credit-options
      - evidence-hub

  - name: environmentVariables
    displayName: 'Copy Environment Variables'
    type: string
    values:
      - 'deploy-preview'
      - 'branch-deploy'
      - 'branch:test'
      - 'branch:staging'
      - 'production'

steps:
  - checkout: self
  - template: steps/install-node.yml
  - script: |
      echo "Installing Dependencies"
      npm i

      branchname="$(Build.SourceBranchName)"
      echo "Branch name is: $branchname"

      deployContext="branch:$branchname"

      alias="${branchname//\//-}"
      alias="${branchname//./-}"
      echo "Alias is: $alias"

      echo "Linking Netlify app: ${{ parameters.appname }}"
      netlify link --filter=${{ parameters.appname }} --name=${{ parameters.appname }}

      echo "Fetching environment variables for context ${{ parameters.environmentVariables }}"
      env_vars_json=$(NETLIFY_AUTH_TOKEN=$(NETLIFY_AUTH_TOKEN) netlify env:list --context=${{ parameters.environmentVariables }} --json --filter=${{ parameters.appname }})

      echo "$env_vars_json" | jq -r 'to_entries | .[] | "\(.key): \(.value)"' | while IFS=: read -r key value; do
        echo "Setting $key for context $deployContext"
        netlify env:set $key $value --context $deployContext --filter ${{ parameters.appname }} > /dev/null 2>&1
      done

      echo "Deploying ${{ parameters.appname }} using context $deployContext to alias $alias"
      netlify deploy --filter=${{ parameters.appname }} --context=$deployContext --auth=$(NETLIFY_AUTH_TOKEN) --alias $alias

    displayName: 'Deploy ${{ parameters.appname }} to Netlify'
