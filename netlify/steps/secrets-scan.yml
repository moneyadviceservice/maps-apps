steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true
  # -----------------------------------------------------
  # 1. Install Gitleaks
  # -----------------------------------------------------
  - script: |
      echo "Installing Gitleaks..."

      # Download tarball and extract
      VERSION="8.18.4"  # Pin to stable version
      curl -sSfL \
        "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
        -o gitleaks.tar.gz

      # Extract the binary
      tar -xzf gitleaks.tar.gz gitleaks
      chmod +x gitleaks

      # Verify installation
      echo "Gitleaks installed successfully"
      ./gitleaks version
    displayName: 'Install Gitleaks'

  # -----------------------------------------------------
  # 2. Scan only lines added in PR commits
  # -----------------------------------------------------

  - script: |
      git fetch origin
      TARGET="origin/${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
      MERGE_BASE=$(git merge-base HEAD "$TARGET")

      echo "Diff from $MERGE_BASE..HEAD"
      git diff --name-only "$MERGE_BASE..HEAD"
      git log --oneline "$MERGE_BASE..HEAD" | wc -l

      ./gitleaks detect \
        --no-git \
        --source . \
        --log-opts="$MERGE_BASE..HEAD" \
        --report-format sarif \
        --report-path gitleaks.sarif \
        --verbose
    displayName: 'Gitleaks Diff Scan'
    continueOnError: true

  # -----------------------------------------------------
  # 3. Build a markdown summary of secrets found
  # -----------------------------------------------------
  - script: |
      echo "Summarizing Gitleaks SARIF..."
      COUNT=$(jq '.runs[0].results | length' gitleaks.sarif 2>/dev/null || echo "0")

      if [ "$COUNT" -gt 0 ]; then
        echo "❌ Secrets detected: $COUNT"

        {
          echo "## 🔐 Gitleaks Secret Scan Results"
          echo "**$COUNT potential secret(s) detected.**"
          echo ""
          jq -r '
            .runs[0].results[] |
            "- **Rule:** " + .ruleId + "\n  **File:** " + (.locations[0].physicalLocation.artifactLocation.uri)
          ' gitleaks.sarif | head -10
          echo ""
          echo "> Full results available in the Gitleaks SARIF artifact."
        } > summary.md

      else
        echo "✅ No secrets detected."
        echo "✅ No secrets detected by Gitleaks." > summary.md
      fi
    displayName: 'Create Gitleaks Summary'

  # -----------------------------------------------------
  # 4. Post PR comment using Azure DevOps REST API (only if secrets found)
  # -----------------------------------------------------
  - script: |
      COUNT=$(jq '.runs[0].results | length' gitleaks.sarif 2>/dev/null || echo "0")

      if [ "$COUNT" -eq 0 ]; then
        echo "No secrets detected - skipping PR comment"
        exit 0
      fi

      echo "Posting comment to PR thread for $COUNT secret(s)..."

      COMMENT_CONTENT=$(sed 's/"/\\"/g' summary.md)

      BODY=$(cat <<EOF
      {
        "comments": [
          {
            "parentCommentId": 0,
            "content": "$COMMENT_CONTENT",
            "commentType": "text"
          }
        ],
        "status": "active"
      }
      EOF
      )

      # URL-encode the project name (replace spaces with %20)
      PROJECT_ENCODED=$(echo "$PROJECT" | sed 's/ /%20/g')

      URL="${ORG_URL}${PROJECT_ENCODED}/_apis/git/repositories/${REPO_ID}/pullRequests/${PR_ID}/threads?api-version=7.1"

      echo "Posting to URL: $URL"

      curl --fail -X POST \
        -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        -H "Content-Type: application/json" \
        --data "$BODY" \
        "$URL"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      ORG_URL: $(System.TeamFoundationCollectionUri)
      PROJECT: $(System.TeamProject)
      REPO_ID: $(Build.Repository.ID)
      PR_ID: $(System.PullRequest.PullRequestId)
    displayName: 'Post Gitleaks Summary Comment to PR'

  # -----------------------------------------------------
  # 5. Fail the PR if secrets were detected
  # -----------------------------------------------------
  - script: |
      COUNT=$(jq '.runs[0].results | length' gitleaks.sarif 2>/dev/null || echo "0")

      if [ "$COUNT" -gt 0 ]; then
        echo "##vso[task.logissue type=error]❌ Gitleaks detected secrets in PR diff"
        exit 1
      else
        echo "✅ No secrets detected — PR is safe."
      fi
    displayName: 'Fail PR If Secrets Found'

  # -----------------------------------------------------
  # 6. Publish Gitleaks SARIF as pipeline artifact
  # -----------------------------------------------------
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Gitleaks SARIF'
    condition: always()
    inputs:
      pathToPublish: 'gitleaks.sarif'
      artifactName: 'CodeAnalysisLogs'
