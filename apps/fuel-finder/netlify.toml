[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF apps/fuel-finder package.json libs/shared"

[[context.production.plugins]]
    package = "/netlify/tools/plugins/stop-build"

[[context.deploy-preview.plugins]]
    package = "/netlify/tools/plugins/stop-build"
 
[[context.develop.plugins]]
    package = "/netlify/tools/plugins/stop-build"

[[plugins]]
    package = "@netlify/plugin-csp-nonce"
    [plugins.inputs]
        reportOnly = false

[dev]
    base = "/"
    command = "npx nx run fuel-finder:serve"
    targetPort = 4391
    autoLaunch = false
