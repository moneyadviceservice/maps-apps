[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF apps/pensions-dashboard package.json libs/shared"

[[context.develop.plugins]]
    package = "/netlify/tools/plugins/stop-build"

# Production: Enforce CSP (reportOnly = false)
[context.production]
  [[context.production.plugins]]
    package = "@netlify/plugin-csp-nonce"
    [context.production.plugins.inputs]
      reportOnly = false

# Staging: Enforce CSP (reportOnly = false)
[context.staging]
  [[context.staging.plugins]]
    package = "@netlify/plugin-csp-nonce"
    [context.staging.plugins.inputs]
      reportOnly = false

# Default fallback for all other contexts (branch-deploy, etc.)
[[plugins]]
    package = "@netlify/plugin-csp-nonce"
    [plugins.inputs]
        reportOnly = true
