trigger: none
pr: none

schedules:
  - cron: '0 23 * * 0-5' # Runs 23:00 UTC (Midnight BST, 23:00 GMT), Sun–Thu
    displayName: 'Nightly Weekday API Audit'
    branches:
      include:
        - main
    always: true

jobs:
  - job: TriggerAudit
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      - script: |
          set -e

          echo "Encoding Netlify Basic Auth..."
          NETLIFY_AUTH=$(echo -n ":$(NETLIFY_SITE_PASSWORD)" | base64)

          echo "Calling scheduled API..."
          curl --fail --show-error --silent \
              -X POST "$(APP_ROOT_URL)/api/scheduled-jobs/validate-firms" \
              -H "Authorization: Basic $NETLIFY_AUTH" \
              -H "X-Scheduled-Job-Secret: $(API_SECRET)" \
              -w "\nHTTP Status: %{http_code}\n"

        displayName: 'Invoke TID API to validate firms against the FCA register'
